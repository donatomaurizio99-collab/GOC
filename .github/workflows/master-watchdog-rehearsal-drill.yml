name: Master Watchdog Rehearsal Drill

on:
  schedule:
    - cron: "45 4 * * 1"
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch label for the injected watchdog rehearsal"
        required: false
        default: "master"
      mttr_target_seconds:
        description: "Alert-chain MTTR target in seconds (summary warning threshold)"
        required: false
        default: "300"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  watchdog-rehearsal-drill:
    name: Watchdog Rehearsal Drill
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Run watchdog rehearsal drill
        shell: pwsh
        env:
          REPO_FULL: ${{ github.repository }}
          BRANCH_NAME: ${{ github.event.inputs.branch || 'master' }}
          MTTR_TARGET_SECONDS: ${{ github.event.inputs.mttr_target_seconds || '300' }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          .\scripts\run-master-watchdog-rehearsal-drill.ps1 `
            -Repo "$env:REPO_FULL" `
            -Branch "$env:BRANCH_NAME" `
            -RunUrl "$env:RUN_URL" `
            -MttrTargetSeconds "$env:MTTR_TARGET_SECONDS" `
            -CheckReportFile "artifacts\master-guard-workflow-health-rehearsal-check.json" `
            -IssueUpsertReportFile "artifacts\master-guard-workflow-health-rehearsal-issue-upsert.json" `
            -OutputFile "artifacts\master-guard-workflow-health-rehearsal-drill.json" `
            -MarkdownOutputFile "artifacts\master-guard-workflow-health-rehearsal-drill.md"

      - name: Publish watchdog rehearsal summary
        if: always()
        shell: pwsh
        run: |
          if (Test-Path "artifacts\master-guard-workflow-health-rehearsal-drill.md") {
            Get-Content "artifacts\master-guard-workflow-health-rehearsal-drill.md" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          }

      - name: Upload watchdog rehearsal check report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: master-guard-workflow-health-rehearsal-check
          path: artifacts/master-guard-workflow-health-rehearsal-check.json
          if-no-files-found: error

      - name: Upload watchdog rehearsal issue-upsert report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: master-guard-workflow-health-rehearsal-issue-upsert
          path: artifacts/master-guard-workflow-health-rehearsal-issue-upsert.json
          if-no-files-found: error

      - name: Upload watchdog rehearsal drill report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: master-guard-workflow-health-rehearsal-drill
          path: |
            artifacts/master-guard-workflow-health-rehearsal-drill.json
            artifacts/master-guard-workflow-health-rehearsal-drill.md
          if-no-files-found: error

