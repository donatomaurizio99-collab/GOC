name: Desktop Build

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Build mode to run
        required: true
        type: choice
        default: both
        options:
          - onedir
          - onefile
          - both
  push:
    tags:
      - "v*"

concurrency:
  group: desktop-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Windows Desktop Artifact
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install desktop build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[desktop,desktop-build]"

      - name: Resolve build modes
        id: modes
        shell: pwsh
        run: |
          $modeInput = "${{ github.event.inputs.mode }}"
          if ([string]::IsNullOrWhiteSpace($modeInput)) {
            $modeInput = "both"
          }
          if ($modeInput -eq "both") {
            "modes=onedir,onefile" >> $env:GITHUB_OUTPUT
          } else {
            "modes=$modeInput" >> $env:GITHUB_OUTPUT
          }

      - name: Build desktop onedir
        if: contains(steps.modes.outputs.modes, 'onedir')
        shell: pwsh
        run: |
          .\scripts\build-desktop.ps1 -Mode onedir -Name GoalOpsConsole -Clean

      - name: Build desktop onefile
        if: contains(steps.modes.outputs.modes, 'onefile')
        shell: pwsh
        run: |
          .\scripts\build-desktop.ps1 -Mode onefile -Name GoalOpsConsole -Clean

      - name: Resolve release metadata
        id: release
        shell: pwsh
        run: |
          $modeInput = "${{ github.event.inputs.mode }}"
          if ([string]::IsNullOrWhiteSpace($modeInput)) {
            $modeInput = "both"
          }

          $channel = "snapshot"
          $version = "0.1.0-ci.$env:GITHUB_RUN_NUMBER"
          if ($env:GITHUB_REF -like "refs/tags/v*") {
            $channel = "stable"
            $version = $env:GITHUB_REF.Substring("refs/tags/v".Length)
          }

          "package_mode=$modeInput" >> $env:GITHUB_OUTPUT
          "channel=$channel" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Resolve signing inputs
        id: signing
        shell: pwsh
        env:
          SIGN_PFX_BASE64: ${{ secrets.DESKTOP_SIGN_PFX_BASE64 }}
          SIGN_PFX_PASSWORD: ${{ secrets.DESKTOP_SIGN_PFX_PASSWORD }}
          SIGN_CERT_THUMBPRINT: ${{ secrets.DESKTOP_SIGN_CERT_THUMBPRINT }}
          SIGN_TIMESTAMP_URL: ${{ secrets.DESKTOP_SIGN_TIMESTAMP_URL }}
        run: |
          $signMode = "none"
          $signPfxPath = ""
          $signTimestamp = if (-not [string]::IsNullOrWhiteSpace($env:SIGN_TIMESTAMP_URL)) {
            $env:SIGN_TIMESTAMP_URL
          } else {
            "https://timestamp.digicert.com"
          }

          if (
            -not [string]::IsNullOrWhiteSpace($env:SIGN_PFX_BASE64) -and
            -not [string]::IsNullOrWhiteSpace($env:SIGN_PFX_PASSWORD)
          ) {
            $signMode = "pfx"
            $signPfxPath = Join-Path $env:RUNNER_TEMP "goal-ops-codesign.pfx"
            $bytes = [Convert]::FromBase64String($env:SIGN_PFX_BASE64)
            [IO.File]::WriteAllBytes($signPfxPath, $bytes)
          } elseif (-not [string]::IsNullOrWhiteSpace($env:SIGN_CERT_THUMBPRINT)) {
            $signMode = "thumbprint"
          }

          "sign_mode=$signMode" >> $env:GITHUB_OUTPUT
          "sign_pfx_path=$signPfxPath" >> $env:GITHUB_OUTPUT
          "sign_timestamp=$signTimestamp" >> $env:GITHUB_OUTPUT

      - name: Package desktop release artifacts
        shell: pwsh
        run: |
          if ("${{ steps.signing.outputs.sign_mode }}" -eq "pfx") {
            .\scripts\package-desktop-release.ps1 `
              -Name GoalOpsConsole `
              -Version "${{ steps.release.outputs.version }}" `
              -Channel "${{ steps.release.outputs.channel }}" `
              -Mode "${{ steps.release.outputs.package_mode }}" `
              -OutputDir "artifacts" `
              -Sign `
              -PfxPath "${{ steps.signing.outputs.sign_pfx_path }}" `
              -PfxPassword "${{ secrets.DESKTOP_SIGN_PFX_PASSWORD }}" `
              -TimeStampUrl "${{ steps.signing.outputs.sign_timestamp }}"
          } elseif ("${{ steps.signing.outputs.sign_mode }}" -eq "thumbprint") {
            .\scripts\package-desktop-release.ps1 `
              -Name GoalOpsConsole `
              -Version "${{ steps.release.outputs.version }}" `
              -Channel "${{ steps.release.outputs.channel }}" `
              -Mode "${{ steps.release.outputs.package_mode }}" `
              -OutputDir "artifacts" `
              -Sign `
              -CertThumbprint "${{ secrets.DESKTOP_SIGN_CERT_THUMBPRINT }}" `
              -TimeStampUrl "${{ steps.signing.outputs.sign_timestamp }}"
          } else {
            .\scripts\package-desktop-release.ps1 `
              -Name GoalOpsConsole `
              -Version "${{ steps.release.outputs.version }}" `
              -Channel "${{ steps.release.outputs.channel }}" `
              -Mode "${{ steps.release.outputs.package_mode }}" `
              -OutputDir "artifacts"
          }

      - name: Cleanup signing material
        if: always()
        shell: pwsh
        run: |
          $pfxPath = "${{ steps.signing.outputs.sign_pfx_path }}"
          if (-not [string]::IsNullOrWhiteSpace($pfxPath) -and (Test-Path -LiteralPath $pfxPath)) {
            Remove-Item -LiteralPath $pfxPath -Force
          }

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-${{ github.run_number }}
          path: artifacts/*
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Goal Ops Console ${{ github.ref_name }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            artifacts/*
