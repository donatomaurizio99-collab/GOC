name: Master Watchdog Rehearsal SLO Guard

on:
  schedule:
    - cron: "25 5 * * *"
  workflow_dispatch:
    inputs:
      max_age_hours:
        description: "Maximum allowed age (hours) of latest successful watchdog rehearsal drill run"
        required: false
        default: "192"
      per_page:
        description: "Maximum completed runs fetched from watchdog rehearsal drill workflow"
        required: false
        default: "20"
      allow_breach:
        description: "Do not fail workflow when drill SLO breach is detected"
        required: false
        default: "false"
      recovery_threshold:
        description: "Healthy nightly runs required before auto-closing an open watchdog SLO issue"
        required: false
        default: "2"
      active_comment_cooldown:
        description: "Comment cooldown for unchanged active alerts (comment every N runs)"
        required: false
        default: "3"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  issues: write

jobs:
  watchdog-rehearsal-slo-guard:
    name: Watchdog Rehearsal SLO Guard
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Run watchdog rehearsal SLO guard
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          REPO_FULL: ${{ github.repository }}
          MAX_AGE_HOURS: ${{ github.event.inputs.max_age_hours || '192' }}
          PER_PAGE: ${{ github.event.inputs.per_page || '20' }}
          ALLOW_BREACH: ${{ github.event.inputs.allow_breach || 'false' }}
        run: |
          if ($env:ALLOW_BREACH -eq "true") {
            .\scripts\run-master-watchdog-rehearsal-slo-guard.ps1 `
              -Repo "$env:REPO_FULL" `
              -MaxAgeHours "$env:MAX_AGE_HOURS" `
              -PerPage "$env:PER_PAGE" `
              -OutputFile "artifacts\master-watchdog-rehearsal-slo-guard.json" `
              -AllowBreach
          } else {
            .\scripts\run-master-watchdog-rehearsal-slo-guard.ps1 `
              -Repo "$env:REPO_FULL" `
              -MaxAgeHours "$env:MAX_AGE_HOURS" `
              -PerPage "$env:PER_PAGE" `
              -OutputFile "artifacts\master-watchdog-rehearsal-slo-guard.json"
          }

      - name: Upsert watchdog rehearsal SLO issue
        if: always()
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          REPO_FULL: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RECOVERY_THRESHOLD: ${{ github.event.inputs.recovery_threshold || '2' }}
          ACTIVE_COMMENT_COOLDOWN: ${{ github.event.inputs.active_comment_cooldown || '3' }}
        run: |
          .\scripts\run-ci-alert-issue-upsert.ps1 `
            -SignalId "master-watchdog-rehearsal-drill-slo" `
            -Repo "$env:REPO_FULL" `
            -ReportFile "artifacts\master-watchdog-rehearsal-slo-guard.json" `
            -RunUrl "$env:RUN_URL" `
            -RecoveryThreshold "$env:RECOVERY_THRESHOLD" `
            -ActiveCommentCooldown "$env:ACTIVE_COMMENT_COOLDOWN" `
            -OutputFile "artifacts\master-watchdog-rehearsal-slo-guard-issue-upsert.json"

      - name: Run watchdog rehearsal SLO guard chain selftest
        if: always()
        shell: pwsh
        run: |
          .\scripts\run-master-guard-chain-selftest.ps1 `
            -SignalId "master-watchdog-rehearsal-drill-slo" `
            -GuardReportFile "artifacts\master-watchdog-rehearsal-slo-guard.json" `
            -IssueUpsertReportFile "artifacts\master-watchdog-rehearsal-slo-guard-issue-upsert.json" `
            -OutputFile "artifacts\master-watchdog-rehearsal-slo-guard-selftest.json"

      - name: Upload watchdog rehearsal SLO guard report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: master-watchdog-rehearsal-slo-guard
          path: artifacts/master-watchdog-rehearsal-slo-guard.json
          if-no-files-found: error

      - name: Upload watchdog rehearsal SLO issue upsert report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: master-watchdog-rehearsal-slo-guard-issue-upsert
          path: artifacts/master-watchdog-rehearsal-slo-guard-issue-upsert.json
          if-no-files-found: error

      - name: Upload watchdog rehearsal SLO guard chain selftest report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: master-watchdog-rehearsal-slo-guard-selftest
          path: artifacts/master-watchdog-rehearsal-slo-guard-selftest.json
          if-no-files-found: error

