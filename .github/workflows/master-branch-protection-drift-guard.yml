name: Master Branch Protection Drift Guard

on:
  schedule:
    - cron: "20 2 * * *"
  workflow_dispatch:
    inputs:
      allow_drift:
        description: "Do not fail workflow when branch-protection drift is detected"
        required: false
        default: "false"
      recovery_threshold:
        description: "Healthy nightly runs required before auto-closing an open drift issue"
        required: false
        default: "2"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  issues: write

jobs:
  branch-protection-drift-guard:
    name: Branch Protection Drift Guard
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Run branch-protection drift guard
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          ALLOW_DRIFT: ${{ github.event.inputs.allow_drift || 'false' }}
        run: |
          $arguments = @(
            "-OutputFile", "artifacts\\master-branch-protection-drift-guard.json"
          )
          if ($env:ALLOW_DRIFT -eq "true") {
            $arguments += "-AllowDrift"
          }
          .\scripts\run-master-branch-protection-drift-guard.ps1 @arguments

      - name: Upsert drift alert issue
        if: always()
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          REPO_FULL: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RECOVERY_THRESHOLD: ${{ github.event.inputs.recovery_threshold || '2' }}
        run: |
          .\scripts\run-ci-alert-issue-upsert.ps1 `
            -SignalId "master-branch-protection-drift" `
            -Repo "$env:REPO_FULL" `
            -ReportFile "artifacts\master-branch-protection-drift-guard.json" `
            -RunUrl "$env:RUN_URL" `
            -RecoveryThreshold "$env:RECOVERY_THRESHOLD" `
            -OutputFile "artifacts\master-branch-protection-drift-issue-upsert.json"

      - name: Upload branch-protection drift report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: master-branch-protection-drift-guard
          path: artifacts/master-branch-protection-drift-guard.json
          if-no-files-found: error

      - name: Upload branch-protection drift issue upsert report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: master-branch-protection-drift-issue-upsert
          path: artifacts/master-branch-protection-drift-issue-upsert.json
          if-no-files-found: error
