name: CI

on:
  push:
    branches:
      - master
      - codex/**
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-gate-windows:
    name: Release Gate (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test,security]"

      - name: Verify release-gate registry sync
        shell: pwsh
        run: |
          .\scripts\run-release-gate-registry-sync.ps1 -OutputFile "artifacts/release-gate-registry-sync-ci.json"

      - name: Attest release-gate registry sync report
        shell: pwsh
        run: |
          .\scripts\run-release-gate-registry-attestation-gate.ps1 -RegistrySyncReportFile "artifacts/release-gate-registry-sync-ci.json" -OutputFile "artifacts/release-gate-registry-attestation-gate-ci.json"

      - name: Run release gate
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          .\scripts\release-gate.ps1 -StrictA11yTestHarnessCheck -StrictAlertRoutingOnCallCheck -StrictAuditTrailHardeningCheck -StrictAutoRollbackPolicyDrill -StrictBackupRestoreDrill -StrictBackupRestoreStressDrill -StrictCanaryGuardrailCheck -StrictCriticalDrillFlakeGate -StrictDbCorruptionQuarantineDrill -StrictDbSafeModeWatchdogDrill -StrictDesktopUpdateSafetyDrill -StrictDisasterRecoveryRehearsalPack -StrictDiskPressureFaultInjectionDrill -StrictEventConsumerRecoveryChaosDrill -StrictFailureBudgetDashboard -StrictFileDatabaseProbe -StrictFsyncIoStallDrill -StrictIncidentDrillAutomationCheck -StrictIncidentRollbackDrill -StrictInvariantBurstDrill -StrictInvariantMonitorWatchdogDrill -StrictLoadProfileFrameworkCheck -StrictLongSoakBudgetDrill -StrictMigrationRehearsal -StrictMultiDbAtomicSwitchDrill -StrictP0BurnInConsecutiveGreen -StrictP0ClosureReport -StrictP0ReleaseEvidenceBundle -StrictP0ReportSchemaContractCheck -StrictP0RunbookContractCheck -StrictPowerLossDurabilityDrill -StrictRecoveryHardAbortDrill -StrictRecoveryIdempotenceDrill -StrictReleaseFreezePolicyDrill -StrictReleaseGateChaosMatrixContinuousCheck -StrictReleaseGateDeployRehearsalCheck -StrictReleaseGateEvidenceAttestationCheck -StrictReleaseGateEvidenceFreshnessCheck -StrictReleaseGateEvidenceHashManifestCheck -StrictReleaseGateEvidenceLineageCheck -StrictReleaseGateHypercareActivationCheck -StrictReleaseGateOperationsHandoffReadinessCheck -StrictReleaseGatePerformanceBudgetCheck -StrictReleaseGatePerformanceHistoryCheck -StrictReleaseGatePostCutoverFinalizationCheck -StrictReleaseGatePostReleaseContinuityCheck -StrictReleaseGatePostReleaseWatchCheck -StrictReleaseGateProductionCutoverReadinessCheck -StrictReleaseGateProductionFinalAttestationCheck -StrictReleaseGateProductionReadinessCertificationCheck -StrictReleaseGateProductionSustainabilityCertificationCheck -StrictReleaseGateRcCanaryRolloutCheck -StrictReleaseGateReleaseTrainReadinessCheck -StrictReleaseGateRollbackTriggerIntegrityCheck -StrictReleaseGateRuntimeStabilityDrill -StrictReleaseGateSloBurnRateV2Check -StrictReleaseGateStabilityFinalReadinessCheck -StrictReleaseGateStagingSoakReadinessCheck -StrictReleaseGateSteadyStateCertificationCheck -StrictReleaseGateStepTimingSchemaCheck -StrictReleaseGateSupplyChainArtifactTrustCheck -StrictRtoRpoAssertionCheck -StrictSafeModeUxDegradationCheck -StrictSecurityCiLaneCheck -StrictSecurityConfigHardeningCheck -StrictSnapshotRestoreCrashConsistencyDrill -StrictSqliteRealFullDrill -StrictStorageCorruptionHardeningDrill -StrictUpgradeDowngradeCompatibilityDrill -StrictWalCheckpointCrashDrill -StrictWorkflowLockResilienceDrill -StrictWorkflowSoakDrill -StrictWorkflowWorkerRestartDrill

      - name: Upload release evidence artifacts
        uses: actions/upload-artifact@v4
        with:
          name: p0-release-evidence-bundle
          path: |
            artifacts/p0-*-release-gate.json
            artifacts/p0-report-schema-contract-release-gate.json
            artifacts/p0-release-evidence-bundle-release-gate.json
            artifacts/p0-release-evidence-files-release-gate/**
            artifacts/p0-closure-report-release-gate.json
            artifacts/p0-disaster-recovery-rehearsal-pack-release-gate.json
            artifacts/p0-disaster-recovery-rehearsal-pack-evidence-release-gate/**
            artifacts/incident-rollback-release-gate.json
            artifacts/failure-budget-dashboard-release-gate.json
            artifacts/safe-mode-ux-degradation-release-gate.json
            artifacts/a11y-test-harness-release-gate.json
            artifacts/release-gate-runtime-stability-release-gate.json
            artifacts/critical-drill-flake-gate-release-gate.json
            artifacts/release-gate-step-timings-release-gate.json
            artifacts/release-gate-evidence-freshness-release-gate.json
            artifacts/release-gate-evidence-hash-manifest-release-gate.json
            artifacts/release-gate-evidence-manifest-release-gate.json
            artifacts/release-gate-step-timing-schema-release-gate.json
            artifacts/release-gate-performance-history-release-gate.json
            artifacts/release-gate-performance-budget-release-gate.json
            artifacts/release-gate-stability-final-readiness-release-gate.json
            artifacts/release-gate-staging-soak-readiness-release-gate.json
            artifacts/release-gate-rc-canary-rollout-release-gate.json
            artifacts/release-gate-evidence-lineage-release-gate.json
            artifacts/release-gate-production-readiness-certification-release-gate.json
            artifacts/release-gate-slo-burn-rate-v2-release-gate.json
            artifacts/release-gate-deploy-rehearsal-release-gate.json
            artifacts/release-gate-chaos-matrix-continuous-release-gate.json
            artifacts/release-gate-supply-chain-artifact-trust-release-gate.json
            artifacts/release-gate-operations-handoff-readiness-release-gate.json
            artifacts/release-gate-evidence-attestation-release-gate.json
            artifacts/release-gate-release-train-readiness-release-gate.json
            artifacts/release-gate-production-final-attestation-release-gate.json
            artifacts/release-gate-production-cutover-readiness-release-gate.json
            artifacts/release-gate-hypercare-activation-release-gate.json
            artifacts/release-gate-rollback-trigger-integrity-release-gate.json
            artifacts/release-gate-post-cutover-finalization-release-gate.json
            artifacts/release-gate-post-release-watch-release-gate.json
            artifacts/release-gate-steady-state-certification-release-gate.json
            artifacts/release-gate-post-release-continuity-release-gate.json
            artifacts/release-gate-production-sustainability-certification-release-gate.json
            artifacts/release-gate-registry-sync-ci.json
            artifacts/release-gate-registry-attestation-gate-ci.json
            artifacts/security-config-hardening-release-gate.json
            artifacts/audit-trail-hardening-release-gate.json
            artifacts/security-ci-lane-release-gate.json
            artifacts/security-sbom-release-gate.json
            artifacts/alert-routing-oncall-release-gate.json
            artifacts/incident-drill-automation-release-gate.json
            artifacts/load-profile-framework-release-gate.json
            artifacts/auto-rollback-policy-release-gate.json
            artifacts/canary-guardrails-release-gate.json
            artifacts/rto-rpo-assertion-release-gate.json
          if-no-files-found: error

  security-ci-lane:
    name: Security CI Lane
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test,security]"

      - name: Run security lane check
        run: |
          python ./scripts/security-ci-lane-check.py --label ci --deployment-profile production --scan-path goal_ops_console --max-dependency-vulnerabilities 0 --max-sast-high 0 --max-sast-medium 200 --sbom-output-file artifacts/security-sbom-ci.json --output-file artifacts/security-ci-lane-ci.json

      - name: Upload security lane artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-ci-lane
          path: |
            artifacts/security-ci-lane-ci.json
            artifacts/security-sbom-ci.json
          if-no-files-found: error

  test:
    name: Pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[test]"

      - name: Run test suite
        run: python -m pytest -q

  desktop-smoke-windows:
    name: Desktop Smoke (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run desktop smoke
        shell: pwsh
        run: |
          python .\scripts\desktop-smoke.py
